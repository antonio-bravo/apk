name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleRelease

    - name: List APK output directory
      run: find app/build/outputs/apk/ -name "*.apk"

    - name: Check APK exists
      run: |
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          echo "APK found at $APK_PATH"
          echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV
        else
          echo "APK not found, build failed"
          exit 1
        fi

    - name: Rename APK
      run: cp ${{ env.APK_FILE }} apk-tv.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        files: apk-tv.apk
        generate_release_notes: true